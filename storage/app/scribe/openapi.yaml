openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: 'Advertising Platform API - A comprehensive API for managing advertisements, stores, traders, and user interactions.'
  version: 1.0.0
servers:
  -
    url: 'http://localhost'
tags:
  -
    name: Authentication
    description: ''
  -
    name: 'User Management'
    description: ''
  -
    name: 'Trader Management'
    description: ''
  -
    name: 'Advertisement Management'
    description: ''
  -
    name: 'Post Management'
    description: ''
  -
    name: 'Search & Analytics'
    description: ''
  -
    name: Endpoints
    description: ''
  -
    name: Interactions
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your authentication token by logging in. Most endpoints require Bearer token authentication using Laravel Sanctum.'
security:
  -
    default: []
paths:
  /api/user/register:
    post:
      summary: "Register a new user account.\n\nCreates a new user account with the provided credentials. Upon successful registration,\nreturns user details along with an authentication token."
      operationId: registerANewUserAccountCreatesANewUserAccountWithTheProvidedCredentialsUponSuccessfulRegistrationreturnsUserDetailsAlongWithAnAuthenticationToken
      description: ''
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'User registered successfully'
                  data:
                    user:
                      id: 1
                      name: 'John Doe'
                      phone: '+1234567890'
                      email: john.doe@example.com
                    token: 1|abc123tokenxyz
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'User registered successfully'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'John Doe'
                          phone:
                            type: string
                            example: '+1234567890'
                          email:
                            type: string
                            example: john.doe@example.com
                      token:
                        type: string
                        example: 1|abc123tokenxyz
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: 'Validation errors'
                  errors:
                    phone:
                      - 'The phone has already been taken.'
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation errors'
                  errors:
                    type: object
                    properties:
                      phone:
                        type: array
                        example:
                          - 'The phone has already been taken.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "User's full name."
                  example: 'John Doe'
                  nullable: false
                phone:
                  type: string
                  description: "User's phone number (must be unique)."
                  example: '+1234567890'
                  nullable: false
                email:
                  type: string
                  description: "optional User's email address."
                  example: john.doe@example.com
                  nullable: true
                password:
                  type: string
                  description: "User's password (minimum 6 characters)."
                  example: password123
                  nullable: false
                fcm_token:
                  type: string
                  description: 'optional Firebase Cloud Messaging token for push notifications.'
                  example: fcm_token_here
                  nullable: true
              required:
                - name
                - phone
                - password
      security: []
  /api/user/login:
    post:
      summary: "User login.\n\nAuthenticates a user with phone and password credentials and returns an authentication token."
      operationId: userLoginAuthenticatesAUserWithPhoneAndPasswordCredentialsAndReturnsAnAuthenticationToken
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'Login successful'
                  data:
                    user:
                      id: 1
                      name: 'John Doe'
                      phone: '+1234567890'
                      email: john.doe@example.com
                    token: 1|abc123tokenxyz
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Login successful'
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'John Doe'
                          phone:
                            type: string
                            example: '+1234567890'
                          email:
                            type: string
                            example: john.doe@example.com
                      token:
                        type: string
                        example: 1|abc123tokenxyz
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: 'Invalid credentials'
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Invalid credentials'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: 'Validation errors'
                  errors:
                    phone:
                      - 'The phone field is required.'
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation errors'
                  errors:
                    type: object
                    properties:
                      phone:
                        type: array
                        example:
                          - 'The phone field is required.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: "User's phone number."
                  example: '+1234567890'
                  nullable: false
                password:
                  type: string
                  description: "User's password (minimum 6 characters)."
                  example: password123
                  nullable: false
                fcm_token:
                  type: string
                  description: 'optional Firebase Cloud Messaging token for push notifications.'
                  example: fcm_token_here
                  nullable: true
              required:
                - phone
                - password
      security: []
  /api/trader/register:
    post:
      summary: "Register a new trader account.\n\nCreates a new trader account with store details. Upon successful registration,\nreturns trader details along with an authentication token."
      operationId: registerANewTraderAccountCreatesANewTraderAccountWithStoreDetailsUponSuccessfulRegistrationreturnsTraderDetailsAlongWithAnAuthenticationToken
      description: ''
      parameters: []
      responses:
        201:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'Trader registered successfully'
                  data:
                    trader:
                      id: 1
                      owner_contact_number: '+1234567890'
                      city: 'New York'
                      store:
                        id: 1
                        store_name: 'Electronics Store'
                        store_owner_name: 'John Doe'
                    token: 1|abc123tokenxyz
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Trader registered successfully'
                  data:
                    type: object
                    properties:
                      trader:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          owner_contact_number:
                            type: string
                            example: '+1234567890'
                          city:
                            type: string
                            example: 'New York'
                          store:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              store_name:
                                type: string
                                example: 'Electronics Store'
                              store_owner_name:
                                type: string
                                example: 'John Doe'
                      token:
                        type: string
                        example: 1|abc123tokenxyz
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: 'Validation errors'
                  errors:
                    owner_contact_number:
                      - 'The owner contact number has already been taken.'
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation errors'
                  errors:
                    type: object
                    properties:
                      owner_contact_number:
                        type: array
                        example:
                          - 'The owner contact number has already been taken.'
                        items:
                          type: string
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                store_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                  nullable: false
                store_owner_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: amniihfqcoynlazghdtqt
                  nullable: false
                store_number:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: qxbajwbpilpmufinl
                  nullable: false
                sub_category_ids:
                  type: array
                  description: 'The <code>id</code> of an existing record in the sub_categories table.'
                  example:
                    - 17
                  items:
                    type: integer
                owner_contact_number:
                  type: string
                  description: "Trader's phone number (must be unique)."
                  example: '+1234567890'
                  nullable: false
                password:
                  type: string
                  description: "Trader's password (minimum 6 characters)."
                  example: password123
                  nullable: false
                whatsapp_number:
                  type: string
                  description: 'optional WhatsApp contact number.'
                  example: '+1234567890'
                  nullable: true
                telegram_number:
                  type: string
                  description: 'optional Telegram contact number.'
                  example: '+1234567890'
                  nullable: true
                city:
                  type: string
                  description: 'optional City where the store is located.'
                  example: 'New York'
                  nullable: true
                social_media_link:
                  type: string
                  description: 'optional Social media profile link.'
                  example: 'https://facebook.com/store'
                  nullable: true
                image:
                  type: string
                  description: ''
                  example: null
                  nullable: true
                store_description:
                  type: string
                  description: 'optional Description of the store (max 500 characters).'
                  example: 'Best electronics store in town'
                  nullable: true
                fcm_token:
                  type: string
                  description: 'optional Firebase Cloud Messaging token for push notifications.'
                  example: fcm_token_here
                  nullable: false
              required:
                - store_name
                - store_owner_name
                - store_number
                - owner_contact_number
                - password
      security: []
  /api/trader/login:
    post:
      summary: "Trader login.\n\nAuthenticates a trader with phone and password credentials and returns an authentication token."
      operationId: traderLoginAuthenticatesATraderWithPhoneAndPasswordCredentialsAndReturnsAnAuthenticationToken
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'Login successful'
                  data:
                    trader:
                      id: 1
                      owner_contact_number: '+1234567890'
                      city: 'New York'
                      store:
                        id: 1
                        store_name: 'Electronics Store'
                    token: 1|abc123tokenxyz
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Login successful'
                  data:
                    type: object
                    properties:
                      trader:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          owner_contact_number:
                            type: string
                            example: '+1234567890'
                          city:
                            type: string
                            example: 'New York'
                          store:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              store_name:
                                type: string
                                example: 'Electronics Store'
                      token:
                        type: string
                        example: 1|abc123tokenxyz
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: 'Invalid credentials'
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Invalid credentials'
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: "Trader's phone number."
                  example: '+1234567890'
                  nullable: false
                password:
                  type: string
                  description: "Trader's password (minimum 6 characters)."
                  example: password123
                  nullable: false
                fcm_token:
                  type: string
                  description: 'optional Firebase Cloud Messaging token for push notifications.'
                  example: fcm_token_here
                  nullable: true
              required:
                - phone
                - password
      security: []
  /api/user/logout:
    get:
      summary: "User logout.\n\nLogs out the authenticated user by invalidating their current access token."
      operationId: userLogoutLogsOutTheAuthenticatedUserByInvalidatingTheirCurrentAccessToken
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'Logged out successfully'
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Logged out successfully'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: Unauthenticated
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Unauthenticated
      tags:
        - Authentication
  /api/trader/logout:
    get:
      summary: "Trader logout.\n\nLogs out the authenticated trader by invalidating their current access token."
      operationId: traderLogoutLogsOutTheAuthenticatedTraderByInvalidatingTheirCurrentAccessToken
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'Logged out successfully'
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Logged out successfully'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: Unauthenticated
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Unauthenticated
      tags:
        - Authentication
  /api/user/update/profile:
    post:
      summary: "Update user profile.\n\nUpdates the authenticated user's profile information including name and email."
      operationId: updateUserProfileUpdatesTheAuthenticatedUsersProfileInformationIncludingNameAndEmail
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'Profile updated successfully'
                  data:
                    id: 1
                    name: 'Jane Doe'
                    phone: '+1234567890'
                    email: jane.doe@example.com
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Profile updated successfully'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'Jane Doe'
                      phone:
                        type: string
                        example: '+1234567890'
                      email:
                        type: string
                        example: jane.doe@example.com
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: Unauthenticated
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Unauthenticated
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: 'Validation errors'
                  errors:
                    email:
                      - 'The email format is invalid.'
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Validation errors'
                  errors:
                    type: object
                    properties:
                      email:
                        type: array
                        example:
                          - 'The email format is invalid.'
                        items:
                          type: string
      tags:
        - 'User Management'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: "optional User's full name."
                  example: 'Jane Doe'
                  nullable: true
                email:
                  type: string
                  description: "optional User's email address."
                  example: jane.doe@example.com
                  nullable: true
  /api/user/get/profile:
    get:
      summary: "Get authenticated user profile.\n\nRetrieves the complete profile information of the currently authenticated user."
      operationId: getAuthenticatedUserProfileRetrievesTheCompleteProfileInformationOfTheCurrentlyAuthenticatedUser
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  data:
                    id: 1
                    name: 'John Doe'
                    phone: '+1234567890'
                    email: john.doe@example.com
                    created_at: '2024-01-15T10:30:00.000000Z'
                    updated_at: '2024-01-15T10:30:00.000000Z'
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: 'John Doe'
                      phone:
                        type: string
                        example: '+1234567890'
                      email:
                        type: string
                        example: john.doe@example.com
                      created_at:
                        type: string
                        example: '2024-01-15T10:30:00.000000Z'
                      updated_at:
                        type: string
                        example: '2024-01-15T10:30:00.000000Z'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: Unauthenticated
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Unauthenticated
      tags:
        - 'User Management'
  /api/cities:
    get:
      summary: "Get list of cities.\n\nRetrieves a list of all available cities in the system."
      operationId: getListOfCitiesRetrievesAListOfAllAvailableCitiesInTheSystem
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  data:
                    - 'New York'
                    - 'Los Angeles'
                    - Chicago
                    - Houston
                    - Phoenix
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: array
                    example:
                      - 'New York'
                      - 'Los Angeles'
                      - Chicago
                      - Houston
                      - Phoenix
                    items:
                      type: string
      tags:
        - 'User Management'
      security: []
  /api/trader/update/profile:
    post:
      summary: "Update trader profile.\n\nUpdates the authenticated trader's profile information including city, contact numbers, and store description."
      operationId: updateTraderProfileUpdatesTheAuthenticatedTradersProfileInformationIncludingCityContactNumbersAndStoreDescription
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  message: 'Profile updated successfully'
                  data:
                    id: 1
                    owner_contact_number: '+1234567890'
                    city: 'Los Angeles'
                    whatsapp_number: '+1234567890'
                    store_description: 'Premium electronics retailer'
                properties:
                  status:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Profile updated successfully'
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      owner_contact_number:
                        type: string
                        example: '+1234567890'
                      city:
                        type: string
                        example: 'Los Angeles'
                      whatsapp_number:
                        type: string
                        example: '+1234567890'
                      store_description:
                        type: string
                        example: 'Premium electronics retailer'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: Unauthenticated
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Unauthenticated
      tags:
        - 'Trader Management'
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                store_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: vmqeopfuudtdsufvyvddq
                  nullable: true
                store_owner_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: amniihfqcoynlazghdtqt
                  nullable: true
                store_number:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: qxbajwbpilpmufinl
                  nullable: true
                sub_category_ids:
                  type: array
                  description: 'The <code>id</code> of an existing record in the sub_categories table.'
                  example:
                    - 17
                  items:
                    type: integer
                owner_contact_number:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: mqeopfuudtdsufvyv
                  nullable: true
                whatsapp_number:
                  type: string
                  description: 'optional WhatsApp contact number.'
                  example: '+1234567890'
                  nullable: true
                telegram_number:
                  type: string
                  description: 'optional Telegram contact number.'
                  example: '+1234567890'
                  nullable: true
                social_media_link:
                  type: string
                  description: 'optional Social media profile link.'
                  example: 'https://facebook.com/store'
                  nullable: true
                image:
                  type: string
                  format: binary
                  description: 'Must be a file. Must be an image. Must not be greater than 2048 kilobytes.'
                  nullable: true
                store_description:
                  type: string
                  description: 'optional Description of the store (max 500 characters).'
                  example: 'Premium electronics retailer'
                  nullable: true
                city:
                  type: string
                  description: 'optional City where the store is located.'
                  example: 'Los Angeles'
                  nullable: false
  /api/trader/get/profile:
    get:
      summary: "Get authenticated trader profile.\n\nRetrieves the complete profile information of the currently authenticated trader including store details and subcategories."
      operationId: getAuthenticatedTraderProfileRetrievesTheCompleteProfileInformationOfTheCurrentlyAuthenticatedTraderIncludingStoreDetailsAndSubcategories
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: true
                  data:
                    id: 1
                    owner_contact_number: '+1234567890'
                    city: 'New York'
                    whatsapp_number: '+1234567890'
                    store:
                      id: 1
                      store_name: 'Electronics Store'
                      store_owner_name: 'John Doe'
                      subCategories:
                        -
                          id: 1
                          name: Smartphones
                          image: 'https://example.com/image.jpg'
                    created_at: '2024-01-15T10:30:00.000000Z'
                properties:
                  status:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      owner_contact_number:
                        type: string
                        example: '+1234567890'
                      city:
                        type: string
                        example: 'New York'
                      whatsapp_number:
                        type: string
                        example: '+1234567890'
                      store:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          store_name:
                            type: string
                            example: 'Electronics Store'
                          store_owner_name:
                            type: string
                            example: 'John Doe'
                          subCategories:
                            type: array
                            example:
                              -
                                id: 1
                                name: Smartphones
                                image: 'https://example.com/image.jpg'
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                  example: 1
                                name:
                                  type: string
                                  example: Smartphones
                                image:
                                  type: string
                                  example: 'https://example.com/image.jpg'
                      created_at:
                        type: string
                        example: '2024-01-15T10:30:00.000000Z'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  status: false
                  message: Unauthenticated
                properties:
                  status:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Unauthenticated
